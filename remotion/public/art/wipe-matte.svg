<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <!-- Wipe matte: solid from the left, wave-shaped leading edge on the right,
       horizontally faded so the reveal is soft, not a hard PowerPoint edge.
       Used as a CSS mask-image by WaterWipe.tsx (alpha = reveal). -->
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.72" stop-color="#fff" stop-opacity="1"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path fill="url(#fade)"
        d="M0 0 H1000
           q 45 40 0 80 q -45 40 0 80
           q 45 40 0 80 q -45 40 0 80
           q 45 40 0 80 q -45 40 0 80
           q 45 40 0 80 q -22 20 0 40
           H0 Z"/>
</svg>
